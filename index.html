<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mini Publisher</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        .login-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 16px;
        }
        .login-title {
            color: var(--text-main);
            font-size: 24px;
            margin-bottom: 10px;
        }
        .login-subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 40px;
            line-height: 1.5;
        }
        .tiktok-btn {
            background: #fe2c55;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .tiktok-btn:hover {
            background: #e02249;
            transform: translateY(-2px);
        }
        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="favicon.svg" alt="Mini Publisher" class="login-logo">
        <h1 class="login-title">Welcome to Mini Publisher</h1>
        <p class="login-subtitle">The ultimate internal tool to schedule and manage your TikTok content automatically.</p>
        
        <a href="dashboard.html" class="tiktok-btn" id="loginBtn">
            <i class="fa-brands fa-tiktok"></i> Log in with TikTok
            <div class="loader" id="loader"></div>
        </a>
    </div>

    <script>
        document.getElementById('loginBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const btn = this;
            btn.innerHTML = '<div class="loader" style="display:block"></div> Authenticating...';
            btn.style.opacity = '0.8';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1500);
        });
    </script>
</body>
</html>
