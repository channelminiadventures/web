<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Adventure - Internal Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-dark);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        .welcome-card {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        .welcome-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            filter: drop-shadow(0 0 20px rgba(0, 194, 199, 0.4));
        }
        .welcome-title {
            color: var(--text-main);
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .welcome-subtitle {
            color: var(--primary);
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .start-btn {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 16px 48px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 194, 199, 0.3);
        }
        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 194, 199, 0.5);
            background: var(--primary-hover);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <img src="favicon.svg" alt="Mini Adventure Logo" class="welcome-logo">
        <h1 class="welcome-title">Mini Adventure</h1>
        <p class="welcome-subtitle">Welcome Collaborator</p>
        
        <a href="dashboard.html" class="start-btn">
            Start <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
</body>
</html>
