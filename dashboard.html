<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Publisher - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <!-- Top Header Navigation -->
    <header class="app-header">
        <div class="header-logo">
            <img src="favicon.svg" alt="Mini Publisher Logo" class="logo-img">
            <span class="logo-text">Mini Adventure</span>
        </div>
        <nav class="header-nav">
            <a href="index.html" class="nav-item"><i class="fa-solid fa-house"></i> Home</a>
            <a href="dashboard.html" class="nav-item active"><i class="fa-solid fa-pen-to-square"></i> Schedule</a>
        </nav>
        <div class="header-actions">
            <div class="user-profile">
                <img src="profile.png" alt="Channel Mini Adventures" class="avatar-img">
                <span>Channel Mini Adventures</span>
            </div>
        </div>
    </header>

    <div class="app-container no-sidebar">
        <!-- Main Content -->
        <main class="main-content">
            <header class="page-title">
                <h2>Schedule a Post</h2>
            </header>

            <div class="dashboard-grid">
                <!-- Post Composer -->
                <div class="card composer-card">
                    <h3>New Post</h3>
                    <form class="post-form">
                        <div class="form-group">
                            <label>Select Platform</label>
                            <div class="platform-selector">
                                <button type="button" class="platform-btn active"><i class="fa-brands fa-tiktok"></i> TikTok</button>
                                <button type="button" class="platform-btn"><i class="fa-brands fa-youtube"></i> Shorts</button>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Upload Video</label>
                            <div class="upload-area">
                                <i class="fa-solid fa-cloud-arrow-up"></i>
                                <p>Drag and drop your MP4 file here</p>
                                <span>or click to browse</span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Caption & Hashtags</label>
                            <textarea placeholder="Write your caption here... #lofi #chill"></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group half">
                                <label>Schedule Date</label>
                                <input type="date">
                            </div>
                            <div class="form-group half">
                                <label>Schedule Time</label>
                                <input type="time">
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary">Save Draft</button>
                            <button type="button" class="btn btn-primary"><i class="fa-solid fa-calendar-check"></i> Schedule Post</button>
                        </div>
                    </form>
                </div>

                <!-- Right Column (Preview & Stats) -->
                <div class="right-col">
                    <div class="card preview-card">
                        <h3>Mobile Preview</h3>
                        <div class="phone-mockup">
                            <div class="phone-screen">
                                <div class="tiktok-ui-placeholder">
                                    <div class="tt-header">Following | <b>For You</b></div>
                                    <div class="tt-side-actions">
                                        <div class="action-btn"><i class="fa-solid fa-heart"></i></div>
                                        <div class="action-btn"><i class="fa-solid fa-comment"></i></div>
                                        <div class="action-btn"><i class="fa-solid fa-bookmark"></i></div>
                                        <div class="action-btn"><i class="fa-solid fa-share"></i></div>
                                    </div>
                                    <div class="tt-bottom-info">
                                        <h4>@channelminiadventures</h4>
                                        <p>Lofi beats to relax and study to... ✨</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card stats-card">
                        <h3>Quick Stats</h3>
                        <div class="stat-row">
                            <div class="stat-box">
                                <span>Scheduled</span>
                                <b>12</b>
                            </div>
                            <div class="stat-box">
                                <span>Published</span>
                                <b>340</b>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
